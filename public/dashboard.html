<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APVS Central Minas – CRM</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:rgba(255,255,255,0.07);
      --text:#e8eaf0;--muted:rgba(255,255,255,0.4);--primary:#1648cc;--pl:rgba(22,72,204,0.15);
      --green:#22c55e;--yellow:#f59e0b;--blue:#3b82f6;--red:#ef4444;--sw:240px;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

    /* Sidebar */
    .sb{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
    .sb-logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
    .logo-ico{width:40px;height:40px;background:linear-gradient(135deg,#6c63ff,#4facfe);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .sb-logo h2{font-size:13px;font-weight:700;line-height:1.3}
    .sb-logo span{font-size:11px;color:var(--muted)}
    .sb-nav{flex:1;padding:12px 0;overflow-y:auto}
    .nav-label{padding:16px 20px 6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
    .nav-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;font-size:14px;color:var(--muted);border-left:3px solid transparent;transition:all .15s;text-decoration:none}
    .nav-item:hover{background:var(--pl);color:var(--text)}
    .nav-item.active{background:var(--pl);color:var(--primary);border-left-color:var(--primary)}
    .nav-item .ico{width:20px;text-align:center;font-size:16px}
    .nav-item .badge{margin-left:auto;background:var(--primary);color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;font-weight:600}
    .sb-foot{padding:16px 20px;border-top:1px solid var(--border)}
    .user-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px;border-radius:10px;transition:background .15s}
    .user-row:hover{background:var(--surface2)}
    .av{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
    .user-info{flex:1;min-width:0}
    .user-info strong{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-info span{font-size:11px;color:var(--muted)}

    /* Main */
    .main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-width:0}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50}
    .topbar h1{font-size:18px;font-weight:600;flex:1}
    .content{flex:1;padding:24px;overflow-y:auto}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;border:none;transition:all .15s}
    .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#1238a8}
    .btn-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text)}
    .btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}.btn-danger:hover{background:rgba(239,68,68,.25)}
    .btn-sm{padding:5px 10px;font-size:12px;border-radius:8px}

    /* Views */
    .view{display:none}.view.active{display:block}

    /* Stats */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .stat-card.blue::before{background:linear-gradient(90deg,#6c63ff,#4facfe)}
    .stat-card.yellow::before{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
    .stat-card.orange::before{background:linear-gradient(90deg,#f97316,#fb923c)}
    .stat-card.green::before{background:linear-gradient(90deg,#22c55e,#4ade80)}
    .stat-label{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
    .stat-value{font-size:36px;font-weight:700;line-height:1;margin-bottom:6px}
    .stat-sub{font-size:12px;color:var(--muted)}

    /* Consultant cards */
    .consultants-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:24px}
    .cc{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px}
    .cc-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .cc-av{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff}
    .cc-stats{display:flex;gap:8px}
    .cs{flex:1;text-align:center;padding:8px 4px;border-radius:10px;font-size:11px;font-weight:500}
    .cs .n{font-size:20px;font-weight:700;display:block}
    .cs.cotacao{background:rgba(59,130,246,.12);color:#60a5fa}
    .cs.negociacao{background:rgba(245,158,11,.12);color:#fbbf24}
    .cs.fechado{background:rgba(34,197,94,.12);color:#4ade80}

    /* Kanban */
    .kanban-filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
    .chip{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:var(--surface);transition:all .15s}
    .chip:hover,.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .kanban-board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start}
    .kcol{background:var(--surface);border-radius:16px;overflow:hidden}
    .kcol-head{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
    .col-dot{width:8px;height:8px;border-radius:50%}
    .col-dot.cotacao{background:var(--blue)}.col-dot.negociacao{background:var(--yellow)}.col-dot.fechado{background:var(--green)}
    .kcol-head h3{font-size:14px;font-weight:600;flex:1}
    .col-cnt{background:var(--surface2);color:var(--muted);font-size:12px;font-weight:600;padding:2px 8px;border-radius:10px}
    .kcards{padding:12px;padding-bottom:80px;display:flex;flex-direction:column;gap:10px;min-height:120px;transition:background .15s,outline .15s}
    .lcard[draggable="true"]{cursor:grab}
    .lcard[draggable="true"]:active{cursor:grabbing}
    .lcard.is-dragging{opacity:.35;transform:scale(.97);pointer-events:none}
    body.dragging-active .lcard:not(.is-dragging){pointer-events:none}
    .kcards.drag-over{background:rgba(108,99,255,.08);outline:2px dashed rgba(108,99,255,.45);border-radius:10px}
    .lcard{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s}
    .lcard:hover{border-color:rgba(108,99,255,.4);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
    .lcard-name{font-weight:600;font-size:14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start}
    .lcard-meta{display:flex;flex-direction:column;gap:3px}
    .lcard-meta span{font-size:12px;color:var(--muted)}
    .ctag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500;margin-top:8px;color:#fff}

    /* Table */
    .tw{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
    .th{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .th h3{font-size:15px;font-weight:600;flex:1}
    .sinput{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;width:220px;transition:all .15s}
    .sinput:focus{border-color:rgba(108,99,255,.5)}.sinput::placeholder{color:var(--muted)}
    select.sinput{cursor:pointer}
    table{width:100%;border-collapse:collapse}
    th{padding:12px 16px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:600}
    td{padding:13px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.02)}

    /* Badges */
    .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500}
    .badge.cotacao{background:rgba(59,130,246,.15);color:#60a5fa}
    .badge.negociacao{background:rgba(245,158,11,.15);color:#fbbf24}
    .badge.fechado{background:rgba(34,197,94,.15);color:#4ade80}
    .badge.admin{background:rgba(34,197,94,.15);color:#4ade80}
    .badge.manager{background:rgba(245,158,11,.15);color:#fbbf24}
    .badge.consultor{background:rgba(59,130,246,.15);color:#60a5fa}

    /* Modal */
    .mo{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
    .mo.open{opacity:1;pointer-events:all}
    .md{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:500px;transform:translateY(10px);transition:transform .2s;max-height:90vh;overflow-y:auto}
    .mo.open .md{transform:translateY(0)}
    .md-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .md-head h3{font-size:17px;font-weight:600}
    .md-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px}
    .md-close:hover{color:var(--text)}
    .fg{margin-bottom:16px}
    .fl{display:block;font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .fi{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:all .15s}
    .fi:focus{border-color:rgba(108,99,255,.5)}.fi::placeholder{color:var(--muted)}
    select.fi,textarea.fi{cursor:pointer}
    textarea.fi{resize:vertical;min-height:80px}
    .md-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
    .divider{height:1px;background:var(--border);margin:16px 0}
    .sec-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

    /* Detail rows */
    .drow{display:flex;gap:16px;margin-bottom:12px}
    .di{flex:1}.di label{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:500;display:block;margin-bottom:4px}
    .di span{font-size:14px;font-weight:500}
    .act-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
    .act-item:last-child{border-bottom:none}
    .act-time{color:var(--muted);font-size:11px;white-space:nowrap}

    /* Avatars */
    .c0{background:linear-gradient(135deg,#6c63ff,#4facfe)}
    .c1{background:linear-gradient(135deg,#f093fb,#f5576c)}
    .c2{background:linear-gradient(135deg,#4facfe,#00f2fe)}
    .c3{background:linear-gradient(135deg,#43e97b,#38f9d7)}
    .c4{background:linear-gradient(135deg,#fa709a,#fee140)}

    /* Toast */
    .toast-wrap{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
    .toast{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:13px;display:flex;align-items:center;gap:10px;min-width:280px;animation:slideIn .3s;box-shadow:0 8px 24px rgba(0,0,0,.4)}
    .toast.success{border-left:3px solid var(--green)}.toast.error{border-left:3px solid var(--red)}.toast.info{border-left:3px solid var(--blue)}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
    .empty{text-align:center;padding:40px 20px;color:var(--muted)}
    .empty .ei{font-size:36px;margin-bottom:8px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    /* ── Mobile ─────────────────────────────────────────────────────────────── */
    .sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;backdrop-filter:blur(2px)}
    .hamburger{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:8px;line-height:1}
    @media(max-width:768px){
      .sb{transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:100}
      .sb.open{transform:translateX(0)}
      .sb-overlay.show{display:block}
      .main{margin-left:0}
      .hamburger{display:flex;align-items:center;justify-content:center}
      .topbar{padding:0 14px;gap:10px}
      .topbar h1{font-size:15px}
      .content{padding:14px}
      /* Stats 2 cols */
      .stats-grid{grid-template-columns:repeat(2,1fr);gap:10px}
      .stat-value{font-size:28px}
      /* Kanban horizontal scroll */
      .kanban-board{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:12px;padding-bottom:12px;-webkit-overflow-scrolling:touch}
      .kanban-board::-webkit-scrollbar{height:4px}
      .kanban-board::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
      .kcol{flex:0 0 82vw;scroll-snap-align:start;max-width:320px}
      .kanban-filters{gap:6px}
      .chip{padding:5px 10px;font-size:12px}
      /* Table: hide secondary cols, bigger tap targets */
      .th{padding:12px 14px;gap:8px}
      .sinput{width:100%!important}
      td,th{padding:10px 12px}
      table th:nth-child(4),table td:nth-child(4){display:none} /* plate */
      table th:nth-child(6),table td:nth-child(6){display:none} /* date */
      /* Modals as bottom sheets */
      .mo{align-items:flex-end;padding:0}
      .md{border-radius:20px 20px 0 0;max-width:100%!important;max-height:92vh;padding:20px}
      /* Admin table responsive */
      .grid2{grid-template-columns:1fr}
      /* Consultant cards */
      .consultants-grid{grid-template-columns:1fr}
      /* Lead cards bigger tap */
      .lcard{padding:16px}
      .btn-sm{padding:8px 12px;font-size:13px}
    }
    @media(max-width:480px){
      .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px}
      .stat-card{padding:14px}
      .stat-value{font-size:24px}
      table th:nth-child(3),table td:nth-child(3){display:none} /* whatsapp */
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sb" id="sb">
  <div class="sb-logo">
    <div class="logo-ico"><img src="/favicon.svg" style="width:26px;height:26px;border-radius:6px"></div>
    <div><h2>APVS Central Minas</h2><span>CRM de Leads</span></div>
  </div>
  <nav class="sb-nav" id="sbNav"></nav>
  <div class="sb-foot">
    <div style="padding:0 12px 8px">
      <button class="btn btn-ghost btn-sm" style="width:100%;font-size:12px;justify-content:center" onclick="openChangePwd()">🔑 Alterar senha</button>
    </div>
    <div class="user-row" onclick="logout()">
      <div class="av c0" id="sbAv">A</div>
      <div class="user-info">
        <strong id="sbName">…</strong>
        <span id="sbRole">–</span>
      </div>
      <span style="color:var(--muted);font-size:14px">↩</span>
    </div>
  </div>
</aside>

<div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

<!-- Main -->
<div class="main">
  <header class="topbar">
    <button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>
    <h1 id="pageTitle">Carregando…</h1>
    <div style="display:flex;gap:10px" id="topActions"></div>
  </header>
  <div class="content" id="content"></div>
</div>

<!-- Modal: lead detail -->
<div class="mo" id="moDetail">
  <div class="md" style="max-width:560px">
    <div class="md-head"><h3 id="detailTitle">Lead</h3><button class="md-close" onclick="closeMo('moDetail')">✕</button></div>
    <div id="detailBody"></div>
    <div class="md-foot"><button class="btn btn-ghost" onclick="closeMo('moDetail')">Fechar</button></div>
  </div>
</div>

<!-- Modal: edit lead -->
<div class="mo" id="moEdit">
  <div class="md" style="max-width:420px">
    <div class="md-head"><h3>Editar Lead</h3><button class="md-close" onclick="closeMo('moEdit')">✕</button></div>
    <div class="fg"><label class="fl">Status</label><select class="fi" id="eStatus"><option value="cotacao">Em Cotação</option><option value="negociacao">Em Negociação</option><option value="fechado">Fechado</option></select></div>
    <div class="fg" id="eConsultantGroup"><label class="fl">Consultor(a)</label><select class="fi" id="eConsultant"></select></div>
    <div class="fg"><label class="fl">Observações</label><textarea class="fi" id="eNotes" placeholder="Observações…"></textarea></div>
    <div class="md-foot">
      <button class="btn btn-ghost" onclick="closeMo('moEdit')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: user -->
<div class="mo" id="moUser">
  <div class="md" style="max-width:500px">
    <div class="md-head"><h3 id="userTitle">Novo Usuário</h3><button class="md-close" onclick="closeMo('moUser')">✕</button></div>
    <div class="fg"><label class="fl">Nome Completo</label><input class="fi" type="text" id="uName" placeholder="Ex: João Silva"></div>
    <div class="grid2">
      <div class="fg"><label class="fl">Usuário (login)</label><input class="fi" type="text" id="uUser" placeholder="joao.silva" autocomplete="off"></div>
      <div class="fg"><label class="fl">Senha</label><input class="fi" type="password" id="uPass" placeholder="••••••••" autocomplete="new-password"></div>
    </div>
    <div class="fg"><label class="fl">Perfil de acesso</label>
      <select class="fi" id="uRole" onchange="toggleURole()">
        <option value="consultor">Consultor(a)</option>
        <option value="manager">Visão geral</option>
      </select>
    </div>
    <div class="fg" id="uLinkGroup"><label class="fl">Consultor(a)</label>
      <select class="fi" id="uConsultantId"><option value="">Selecione…</option></select>
    </div>
    <div id="uEvoSection">
      <div class="divider"></div>
      <div class="sec-title">🔔 Notificações WhatsApp (Evolution API)</div>
      <div class="grid2">
        <div class="fg"><label class="fl">Instância</label><input class="fi" type="text" id="uEvoInst" placeholder="nome-instancia" autocomplete="off"></div>
        <div class="fg"><label class="fl">WhatsApp</label><input class="fi" type="tel" id="uEvoPhone" placeholder="5531999999999" autocomplete="off" inputmode="numeric"></div>
      </div>
      <div class="fg"><label class="fl">API Key</label><input class="fi" type="password" id="uEvoKey" placeholder="Chave API" autocomplete="new-password"><span id="uEvoKeyHint" style="font-size:11px;color:var(--muted);margin-top:4px;display:none">Chave já cadastrada. Deixe em branco para manter.</span></div>
      <div class="fg"><label class="fl">Número para enviar relatório de performance</label><input class="fi" type="tel" id="uReportPhone" placeholder="5531999999999" autocomplete="off" inputmode="numeric"><span style="font-size:11px;color:var(--muted);margin-top:4px;display:block">Receberá o relatório diário automaticamente seg–sex às 19h</span></div>
    </div>
    <div class="md-foot">
      <button class="btn btn-ghost" onclick="closeMo('moUser')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveUser()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: alterar senha -->
<div class="mo" id="moChangePwd">
  <div class="md" style="max-width:380px">
    <div class="md-head"><h3>🔑 Alterar Senha</h3><button class="md-close" onclick="closeMo('moChangePwd')">✕</button></div>
    <div class="fg"><label class="fl">Senha atual</label><input class="fi" type="password" id="cpCurrent" placeholder="••••••••" autocomplete="current-password"></div>
    <div class="fg"><label class="fl">Nova senha</label><input class="fi" type="password" id="cpNew" placeholder="••••••••" autocomplete="new-password"></div>
    <div class="fg"><label class="fl">Confirmar nova senha</label><input class="fi" type="password" id="cpConfirm" placeholder="••••••••" autocomplete="new-password"></div>
    <div class="md-foot">
      <button class="btn btn-ghost" onclick="closeMo('moChangePwd')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveChangePwd()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: consultant whatsapp -->
<div class="mo" id="moConsultant">
  <div class="md" style="max-width:400px">
    <div class="md-head"><h3 id="cTitle">Editar Consultor(a)</h3><button class="md-close" onclick="closeMo('moConsultant')">✕</button></div>
    <div class="fg"><label class="fl">Nome completo</label>
      <input class="fi" type="text" id="cName" placeholder="Ex: Fabiano Souza" autocomplete="off">
    </div>
    <div class="fg"><label class="fl">WhatsApp (com DDI+DDD)</label>
      <input class="fi" type="tel" id="cPhone" placeholder="5531999999999" autocomplete="off" inputmode="numeric">
      <span style="font-size:11px;color:var(--muted);margin-top:4px;display:block">Ex: 5531999990001</span>
    </div>
    <div class="md-foot">
      <button class="btn btn-ghost" onclick="closeMo('moConsultant')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveConsultant()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const AV = ['c0','c1','c2','c3','c4'];
const STATUS_LABEL = { cotacao:'🔵 Cotação', negociacao:'🟡 Negociação', fechado:'🟢 Fechado' };
const ROLE_LABEL   = { admin:'⚙️ Admin', manager:'👔 Gerente', consultor:'🧑‍💼 Consultor(a)' };
const ACTION_LABEL = { created:'Lead criado', status_changed:'Status alterado', reassigned:'Reatribuído', duplicate_blocked:'Duplicata bloqueada' };
const PAGE_TITLES  = { overview:'Visão Geral', kanban:'Board CRM', leads:'Todos os Leads', activity:'Atividades', analise:'Análise & Ranking', admin:'Gerenciar Usuários' };

// ── State ────────────────────────────────────────────────────────────────────
let token, user, consultants = [], allLeads = [], currentView = '', editingLeadId = null, editingUserId = null, editingConsultantId = null, kanbanFilter = null;

// ── Boot ─────────────────────────────────────────────────────────────────────
(async () => {
  try {
    token = localStorage.getItem('crm_token');
    const raw = localStorage.getItem('crm_user');
    if (!token || !raw) return go('/');
    try { user = JSON.parse(raw); } catch { return go('/'); }

    document.getElementById('sbAv').textContent = (user.name||user.username)[0].toUpperCase();
    document.getElementById('sbName').textContent = user.name || user.username;
    document.getElementById('sbRole').textContent = user.role === 'admin' ? '⚙️ Admin' : '';

    buildNav();
    await loadConsultants();
    await refresh();
    setInterval(refresh, 90000);
    if (window.innerWidth > 768) {
      document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(); });
    }
  } catch(err) {
    document.getElementById('content').innerHTML =
      `<div style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:14px;padding:24px;margin:20px">
        <div style="font-size:16px;font-weight:600;color:#ff8080;margin-bottom:8px">⚠️ Erro ao carregar o painel</div>
        <div style="font-size:13px;color:rgba(255,255,255,.6);font-family:monospace;white-space:pre-wrap">${err.stack||err.message||String(err)}</div>
        <div style="margin-top:16px"><button onclick="logout()" style="padding:8px 16px;background:#ef4444;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px">Sair e tentar novamente</button></div>
      </div>`;
    console.error('Boot error:', err);
  }
})();

function go(url) { window.location.replace(url); }
function logout() { localStorage.clear(); go('/'); }

function openChangePwd() {
  ['cpCurrent','cpNew','cpConfirm'].forEach(id => document.getElementById(id).value = '');
  closeSidebar();
  openMo('moChangePwd');
}
async function saveChangePwd() {
  const current = document.getElementById('cpCurrent').value;
  const nw      = document.getElementById('cpNew').value;
  const confirm = document.getElementById('cpConfirm').value;
  if (!current || !nw) return toast('Preencha todos os campos', 'error');
  if (nw !== confirm)  return toast('As senhas não coincidem', 'error');
  if (nw.length < 6)   return toast('Senha deve ter ao menos 6 caracteres', 'error');
  const r = await api('/api/auth/change-password', { method:'POST', body: JSON.stringify({ currentPassword: current, newPassword: nw }) });
  if (r?.error) return toast(r.error, 'error');
  closeMo('moChangePwd');
  toast('Senha alterada com sucesso!', 'success');
}

// ── Navigation ───────────────────────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('sbNav');
  const isAdmin   = user.role === 'admin';
  const isManager = user.role === 'manager';
  const isConsultor = user.role === 'consultor';
  const topActions = document.getElementById('topActions');

  let items = [];
  if (!isConsultor) {
    items.push({ id:'overview', icon:'📊', label:'Visão Geral' });
  }
  items.push({ id:'kanban',   icon:'🗂️', label: isConsultor ? 'Meus Leads' : 'Board CRM' });
  items.push({ id:'leads',    icon:'👥', label: isConsultor ? 'Lista Completa' : 'Todos os Leads', badge:'totalBadge' });
  if (!isConsultor) {
    items.push({ id:'activity', icon:'🕐', label:'Atividades' });
    items.push({ id:'analise',  icon:'📈', label:'Análise & Ranking' });
  }
  if (isAdmin) {
    items.push({ id:'admin', icon:'⚙️', label:'Gerenciar Usuários', section:'Administração' });
  }

  let html = '';
  let lastSection = '';
  items.forEach(it => {
    if (it.section && it.section !== lastSection) {
      html += `<div class="nav-label">${it.section}</div>`;
      lastSection = it.section;
    } else if (!it.section && lastSection === '') {
      html += `<div class="nav-label">Principal</div>`;
      lastSection = 'Principal';
    }
    html += `<a class="nav-item" id="nav-${it.id}" onclick="switchView('${it.id}')">
      <span class="ico">${it.icon}</span> ${it.label}
      ${it.badge ? `<span class="badge" id="${it.badge}">0</span>` : ''}
    </a>`;
  });
  nav.innerHTML = html;

  // Top action button
  if (user.role === 'admin') {
    topActions.innerHTML = `<button class="btn btn-ghost btn-sm" onclick="refresh()">🔄 Atualizar</button>
      <button class="btn btn-primary btn-sm" id="btnAddUser" style="display:none" onclick="openUserModal()">+ Novo Usuário</button>`;
  } else {
    topActions.innerHTML = `<button class="btn btn-ghost btn-sm" onclick="refresh()">🔄 Atualizar</button>`;
  }

  // Default view
  const firstView = items[0].id;
  switchView(firstView);
}

function switchView(name) {
  currentView = name;
  document.getElementById('pageTitle').textContent =
    name === 'kanban' && user.role === 'consultor' ? 'Meus Leads' :
    name === 'leads'  && user.role === 'consultor' ? 'Lista Completa' :
    PAGE_TITLES[name] || name;

  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById(`nav-${name}`);
  if (navEl) navEl.classList.add('active');

  const btnAdd = document.getElementById('btnAddUser');
  if (btnAdd) btnAdd.style.display = (name === 'admin') ? '' : 'none';

  if (name === 'overview') renderOverview();
  else if (name === 'kanban') renderKanbanView();
  else if (name === 'leads') renderLeadsView();
  else if (name === 'activity') renderActivityView();
  else if (name === 'analise')  renderAnaliseView();
  else if (name === 'admin') renderAdminView();
}

// ── API ──────────────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const r = await fetch(path, {
    ...opts,
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers||{}) }
  });
  if (r.status === 401) { logout(); return; }
  return r.json();
}

async function loadConsultants() {
  consultants = await api('/api/consultants') || [];
  // Populate all consultant selects
  ['eConsultant','uConsultantId'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const first = id === 'uConsultantId' ? '<option value="">Selecione…</option>' : '';
    el.innerHTML = first + consultants.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  });
}

async function refresh() {
  try {
    const newLeads = await api('/api/leads');
    if (!newLeads) return;
    const sig = ls => ls.map(l => `${l.id}:${l.status}:${l.updated_at}`).join('|');
    const changed = newLeads.length !== allLeads.length || sig(newLeads) !== sig(allLeads);
    allLeads = newLeads;
    const badge = document.getElementById('totalBadge');
    if (badge) badge.textContent = allLeads.length;
    if (!changed) return;
    // Atualização cirúrgica sem re-render completo (sem flash)
    if (currentView === 'kanban')   renderKanban();
    else if (currentView === 'leads') { const tbody = document.getElementById('leadsBody'); if (tbody) applyFilters(); }
    else if (currentView === 'overview') refreshOverviewStats();
    else if (currentView) switchView(currentView);
  } catch(e) { console.error(e); }
}

// ── Overview ─────────────────────────────────────────────────────────────────
async function refreshOverviewStats() {
  const stats = await api('/api/stats');
  if (!stats) return;
  const s = Object.fromEntries((stats.byStatus||[]).map(x=>[x.status,x.count]));
  const map = { 'ov-total': stats.total, 'ov-cotacao': s.cotacao||0, 'ov-negociacao': s.negociacao||0, 'ov-fechado': s.fechado||0 };
  Object.entries(map).forEach(([id, val]) => { const el = document.getElementById(id); if (el) el.textContent = val; });
  // atualiza lista recente sem piscar
  const recentEl = document.getElementById('recentList');
  if (recentEl && stats.recent) recentEl.innerHTML = stats.recent.length
    ? stats.recent.map(l => leadCardHtml(l)).join('')
    : '<div class="empty"><div class="ei">📭</div><p>Nenhum lead ainda</p></div>';
}

async function renderOverview() {
  const content = document.getElementById('content');
  content.innerHTML = '<div style="color:var(--muted);padding:20px">Carregando…</div>';
  const stats = await api('/api/stats');
  if (!stats) return;

  const s = Object.fromEntries((stats.byStatus||[]).map(x=>[x.status,x.count]));
  content.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card blue"><div class="stat-label">Total de Leads</div><div class="stat-value" id="ov-total">${stats.total}</div><div class="stat-sub">Todos os consultores</div></div>
      <div class="stat-card yellow"><div class="stat-label">Em Cotação</div><div class="stat-value" id="ov-cotacao">${s.cotacao||0}</div><div class="stat-sub">Aguardando proposta</div></div>
      <div class="stat-card orange"><div class="stat-label">Em Negociação</div><div class="stat-value" id="ov-negociacao">${s.negociacao||0}</div><div class="stat-sub">Em andamento</div></div>
      <div class="stat-card green"><div class="stat-label">Fechados</div><div class="stat-value" id="ov-fechado">${s.fechado||0}</div><div class="stat-sub">Concluídos</div></div>
    </div>
    <div class="sec-title" style="margin-bottom:14px">Desempenho por Consultor</div>
    <div class="consultants-grid">${(stats.byConsultant||[]).map((c,i)=>`
      <div class="cc">
        <div class="cc-head">
          <div class="cc-av ${AV[i%5]}">${c.name[0]}</div>
          <div><div style="font-weight:600;font-size:15px">${c.name}</div><div style="font-size:12px;color:var(--muted)">${c.total} lead${c.total!==1?'s':''}</div></div>
        </div>
        <div class="cc-stats">
          <div class="cs cotacao"><span class="n">${c.cotacao||0}</span>Cotação</div>
          <div class="cs negociacao"><span class="n">${c.negociacao||0}</span>Negociação</div>
          <div class="cs fechado"><span class="n">${c.fechado||0}</span>Fechado</div>
        </div>
      </div>`).join('')}
    </div>
    <div class="sec-title" style="margin-bottom:14px">Últimas Atividades</div>
    <div class="tw"><div style="padding:16px;display:flex;flex-direction:column;gap:10px" id="recentList"></div></div>
  `;
  const recent = stats.recent || [];
  document.getElementById('recentList').innerHTML = recent.length
    ? recent.map(l => leadCardHtml(l)).join('')
    : '<div class="empty"><div class="ei">📭</div><p>Nenhum lead ainda</p></div>';
}

// ── Kanban ───────────────────────────────────────────────────────────────────
function renderKanbanView() {
  const isConsultor = user.role === 'consultor';

  // Build kanban HTML once
  let filterHtml = '';
  if (!isConsultor) {
    filterHtml = `<div class="kanban-filters">
      <span style="font-size:13px;color:var(--muted);margin-right:4px">Filtrar:</span>
      <button class="chip active" id="chip-all" onclick="setKanbanFilter(null)">Todos</button>
      ${consultants.map(c=>`<button class="chip" id="chip-${c.id}" onclick="setKanbanFilter(${c.id})">${c.name}</button>`).join('')}
    </div>`;
  } else {
    const myC = consultants.find(c => c.id == user.consultant_id);
    const idx  = myC ? consultants.indexOf(myC) : 0;
    filterHtml = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
      <div class="av ${AV[idx%5]}" style="width:44px;height:44px;font-size:18px;border-radius:14px">${myC?myC.name[0]:'?'}</div>
      <div><div style="font-size:18px;font-weight:700">${myC?myC.name:'Consultor'}</div><div style="font-size:13px;color:var(--muted)">Seus leads ativos</div></div>
    </div>`;
  }

  document.getElementById('content').innerHTML = `
    ${filterHtml}
    <div class="kanban-board">
      ${['cotacao','negociacao','fechado'].map(s=>`
        <div class="kcol">
          <div class="kcol-head"><span class="col-dot ${s}"></span><h3>${STATUS_LABEL[s].replace(/^. /,'')}</h3><span class="col-cnt" id="cnt-${s}">0</span></div>
          <div class="kcards" id="col-${s}" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dragDrop(event,'${s}')"></div>
        </div>`).join('')}
    </div>`;

  renderKanban();
}

function setKanbanFilter(cid) {
  kanbanFilter = cid;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  const target = cid ? document.getElementById(`chip-${cid}`) : document.getElementById('chip-all');
  if (target) target.classList.add('active');
  renderKanban();
}

function renderKanban() {
  const cols = { cotacao:[], negociacao:[], fechado:[] };
  const now = new Date();
  const curMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  let filtered;
  if (user.role === 'consultor') {
    filtered = allLeads.filter(l => l.consultant_id == user.consultant_id);
  } else if (kanbanFilter) {
    filtered = allLeads.filter(l => l.consultant_id == kanbanFilter);
  } else {
    filtered = allLeads;
  }

  filtered.forEach(l => {
    if (!cols[l.status]) return;
    // Coluna fechado: só exibe leads fechados no mês atual
    if (l.status === 'fechado' && !(l.updated_at||'').startsWith(curMonth)) return;
    cols[l.status].push(l);
  });

  ['cotacao','negociacao','fechado'].forEach(s => {
    const cnt = document.getElementById(`cnt-${s}`);
    const col = document.getElementById(`col-${s}`);
    if (!cnt || !col) return;
    cnt.textContent = cols[s].length;
    col.innerHTML = cols[s].length
      ? cols[s].map(l => leadCardHtml(l, true)).join('')
      : '<div class="empty"><p>Nenhum lead</p></div>';
  });
}

// ── Leads table ──────────────────────────────────────────────────────────────
function renderLeadsView() {
  const isAdmin = user.role === 'admin';
  const consultantCol = user.role !== 'consultor' ? `
    <div class="fg" style="width:160px">
      <select class="sinput" id="fConsultant" onchange="applyFilters()" style="width:160px">
        <option value="">Todos os consultores</option>
        ${consultants.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
      </select>
    </div>` : '';

  document.getElementById('content').innerHTML = `
    <div class="tw">
      <div class="th">
        <h3>${user.role==='consultor'?'Meus Leads':'Todos os Leads'}</h3>
        <input type="text" class="sinput" id="fSearch" placeholder="🔍  Buscar nome, telefone ou placa…" oninput="applyFilters()">
        <select class="sinput" id="fStatus" onchange="applyFilters()" style="width:160px">
          <option value="">Todos os status</option>
          <option value="cotacao">Em Cotação</option>
          <option value="negociacao">Em Negociação</option>
          <option value="fechado">Fechado</option>
        </select>
        ${consultantCol}
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>#</th><th>Nome</th><th>WhatsApp</th><th>Placa</th>
            ${user.role!=='consultor'?'<th>Consultor(a)</th>':''}
            <th>Status</th><th>Data</th><th>Ações</th>
          </tr></thead>
          <tbody id="leadsBody"></tbody>
        </table>
      </div>
    </div>`;
  applyFilters();
}

function applyFilters() {
  const search = (document.getElementById('fSearch')?.value||'').toLowerCase();
  const status = document.getElementById('fStatus')?.value||'';
  const cid    = document.getElementById('fConsultant')?.value||'';
  const rows = allLeads.filter(l =>
    (!search || l.name.toLowerCase().includes(search) || l.phone.includes(search) || (l.plate||'').toLowerCase().includes(search)) &&
    (!status || l.status === status) &&
    (!cid    || l.consultant_id == cid)
  );
  const isAdmin = user.role === 'admin';
  const body = document.getElementById('leadsBody');
  if (!body) return;
  body.innerHTML = rows.length ? rows.map(l => `
    <tr>
      <td style="color:var(--muted);font-size:12px">#${l.id}</td>
      <td><strong>${esc(l.name)}</strong></td>
      <td>${l.phone}</td>
      <td>${l.plate||'–'}</td>
      ${user.role!=='consultor'?`<td><span class="ctag ${cColor(l.consultant_id)}" style="padding:4px 10px;border-radius:8px">${l.consultant_name}</span></td>`:''}
      <td><span class="badge ${l.status}">${STATUS_LABEL[l.status]}</span></td>
      <td style="color:var(--muted);font-size:12px">${fmt(l.created_at)}</td>
      <td><div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="openDetail(${l.id})">👁</button>
        <button class="btn btn-ghost btn-sm" onclick="openEdit(${l.id})">✏️</button>
        ${isAdmin?`<button class="btn btn-danger btn-sm" onclick="deleteLead(${l.id})">🗑</button>`:''}
      </div></td>
    </tr>`).join('')
    : `<tr><td colspan="8"><div class="empty"><div class="ei">🔍</div><p>Nenhum lead encontrado</p></div></td></tr>`;
}

// ── Detail modal ─────────────────────────────────────────────────────────────
async function openDetail(id) {
  const lead = await api(`/api/leads/${id}`);
  if (!lead) return;
  document.getElementById('detailTitle').textContent = `Lead: ${lead.name}`;
  document.getElementById('detailBody').innerHTML = `
    <div class="drow">
      <div class="di"><label>Nome</label><span>${esc(lead.name)}</span></div>
      <div class="di"><label>Status</label><span class="badge ${lead.status}">${STATUS_LABEL[lead.status]}</span></div>
    </div>
    <div class="drow">
      <div class="di"><label>WhatsApp</label><span>${lead.phone}</span></div>
      <div class="di"><label>Placa</label><span>${lead.plate||'Não informada'}</span></div>
    </div>
    <div class="drow">
      <div class="di"><label>Consultor</label><span class="ctag ${cColor(lead.consultant_id)}" style="padding:4px 10px;border-radius:8px;font-size:13px">${lead.consultant_name}</span></div>
      <div class="di"><label>Criado em</label><span>${fmt(lead.created_at)}</span></div>
    </div>
    ${lead.notes?`<div class="fg"><label class="fl">Observações</label><div style="background:var(--surface2);padding:12px;border-radius:10px;font-size:13px">${esc(lead.notes)}</div></div>`:''}
    <div class="divider"></div>
    <div class="sec-title">Histórico</div>
    ${(lead.activity||[]).map(a=>`
      <div class="act-item">
        <span style="flex:1">${ACTION_LABEL[a.action]||a.action}: ${esc(a.detail||'')}</span>
        <span class="act-time">${fmt(a.created_at)}</span>
      </div>`).join('') || '<p style="color:var(--muted);font-size:13px">Sem histórico</p>'}
  `;
  openMo('moDetail');
}

// ── Edit modal ───────────────────────────────────────────────────────────────
function openEdit(id) {
  editingLeadId = id;
  const lead = allLeads.find(l => l.id === id);
  if (!lead) return;
  document.getElementById('eStatus').value = lead.status;
  document.getElementById('eConsultant').value = lead.consultant_id;
  document.getElementById('eNotes').value = lead.notes || '';
  // Consultors cannot reassign
  document.getElementById('eConsultantGroup').style.display = user.role === 'consultor' ? 'none' : '';
  openMo('moEdit');
}

async function saveEdit() {
  const newStatus = document.getElementById('eStatus').value;
  const lead = allLeads.find(l => l.id === editingLeadId);
  if (lead?.status === 'fechado' && newStatus !== 'fechado') {
    if (!confirm(`⚠️ Este lead já foi fechado.\nDeseja realmente mover para "${STATUS_LABEL[newStatus].replace(/^\S+ /,'')}"?`)) return;
  }
  const body = { status: newStatus, notes: document.getElementById('eNotes').value };
  if (user.role !== 'consultor') body.consultant_id = parseInt(document.getElementById('eConsultant').value);
  await api(`/api/leads/${editingLeadId}`, { method:'PATCH', body:JSON.stringify(body) });
  closeMo('moEdit');
  await refresh();
  toast('Lead atualizado!', 'success');
}

async function deleteLead(id) {
  if (!confirm('Excluir este lead?')) return;
  await api(`/api/leads/${id}`, { method:'DELETE' });
  await refresh();
  toast('Lead excluído', 'info');
}

// ── Activity ─────────────────────────────────────────────────────────────────
async function renderActivityView() {
  document.getElementById('content').innerHTML = '<div class="tw"><div class="th"><h3>Log de Atividades</h3></div><div id="actBody" style="padding:16px"></div></div>';
  const log = await api('/api/activity') || [];
  document.getElementById('actBody').innerHTML = log.length
    ? log.map(a=>`<div class="act-item">
        <span style="font-size:16px">${{created:'✨',status_changed:'🔄',reassigned:'↗️',duplicate_blocked:'🚫'}[a.action]||'•'}</span>
        <span style="flex:1">${a.lead_name?`<strong>${esc(a.lead_name)}</strong> — `:''}${esc(a.detail||ACTION_LABEL[a.action]||a.action)}</span>
        <span class="act-time">${fmt(a.created_at)}</span>
      </div>`).join('')
    : '<div class="empty"><div class="ei">📋</div><p>Nenhuma atividade</p></div>';
}

// ── Admin ────────────────────────────────────────────────────────────────────
async function renderAdminView() {
  document.getElementById('content').innerHTML = `
    <div class="tw" style="margin-bottom:20px">

// User modal
function toggleURole() {
  const role = document.getElementById('uRole').value;
  document.getElementById('uLinkGroup').style.display = role === 'consultor' ? '' : 'none';
  document.getElementById('uEvoSection').style.display = role !== 'consultor' ? '' : 'none';
}
function openUserModal(id = null) {
  editingUserId = id;
  document.getElementById('userTitle').textContent = id ? 'Editar Usuário' : 'Novo Usuário';
  ['uName','uUser','uPass','uEvoInst','uEvoPhone','uEvoKey','uReportPhone'].forEach(x => document.getElementById(x).value = '');
  document.getElementById('uEvoKeyHint').style.display = 'none';
  if (!id) {
    document.getElementById('uRole').value = 'consultor';
    document.getElementById('uConsultantId').value = '';
  } else {
    const u = (window._adminUsers||[]).find(x => x.id === id);
    if (u) {
      document.getElementById('uName').value = u.name || '';
      document.getElementById('uUser').value = u.username || '';
      document.getElementById('uRole').value = u.role || 'consultor';
      document.getElementById('uConsultantId').value = u.consultant_id || '';
      document.getElementById('uEvoInst').value = u.evo_instance || '';
      document.getElementById('uEvoPhone').value = u.evo_phone || '';
      document.getElementById('uReportPhone').value = u.report_phone || '';
      if (u.has_evo_key) document.getElementById('uEvoKeyHint').style.display = 'block';
    }
  }
  toggleURole();
  openMo('moUser');
}
async function saveUser() {
  const role = document.getElementById('uRole').value;
  const cid  = parseInt(document.getElementById('uConsultantId').value) || null;
  if (role === 'consultor' && !cid) return toast('Selecione o consultor vinculado', 'error');
  const evoKeyVal = document.getElementById('uEvoKey').value;
  const body = {
    name: document.getElementById('uName').value,
    username: document.getElementById('uUser').value,
    password: document.getElementById('uPass').value,
    role, consultant_id: cid,
    evo_instance: document.getElementById('uEvoInst').value,
    evo_phone: document.getElementById('uEvoPhone').value,
    report_phone: document.getElementById('uReportPhone').value,
    ...(evoKeyVal ? { evo_key: evoKeyVal } : {}),
  };
  if (!editingUserId && (!body.username || !body.password)) return toast('Usuário e senha obrigatórios','error');
  const res = editingUserId
    ? await api(`/api/users/${editingUserId}`, { method:'PUT', body:JSON.stringify(body) })
    : await api('/api/users', { method:'POST', body:JSON.stringify(body) });
  if (res?.error) return toast(res.error,'error');
  closeMo('moUser');
  await loadAdminData();
  toast(editingUserId?'Usuário atualizado!':'Usuário criado!','success');
}
async function deleteUser(id) {
  if (!confirm('Excluir este usuário?')) return;
  const r = await api(`/api/users/${id}`, { method:'DELETE' });
  if (r?.error) return toast(r.error,'error');
  await loadAdminData();
  toast('Usuário excluído','info');
}

function exportAnaliseCSV() {
  if (!_analiseData) return;
  const from = _analiseData.from || 'início';
  const to   = _analiseData.to   || 'hoje';
  const s    = Object.fromEntries((_analiseData.byStatus||[]).map(x => [x.status, x.count]));
  const rows = [
    ['Relatório de Performance — APVS Central Minas'],
    [`Período: ${from} até ${to}`],
    [`Gerado em: ${new Date().toLocaleString('pt-BR')}`],
    [],
    ['RESUMO'],
    ['Total de Leads', _analiseData.total],
    ['Em Cotação',     s.cotacao    || 0],
    ['Em Negociação',  s.negociacao || 0],
    ['Fechados',       s.fechado    || 0],
    [],
    ['RANKING DE FECHAMENTOS'],
    ['Posição', 'Consultor(a)', 'Fechados', 'Em Negociação', 'Em Cotação', 'Total'],
    ...(_analiseData.ranking||[]).map((c,i) => [`${i+1}º`, c.name, c.fechados||0, c.negociacao||0, c.cotacao||0, c.total||0])
  ];
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `apvs-performance-${from}-${to}.csv`;
  a.click();
}

// ── Drag & Drop ──────────────────────────────────────────────────────────────
let _dragId = null;

function dragStart(e, id) {
  _dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', String(id));
  setTimeout(() => { e.target.classList.add('is-dragging'); document.body.classList.add('dragging-active'); }, 0);
}

function dragEnd(e) {
  e.target.classList.remove('is-dragging');
  document.body.classList.remove('dragging-active');
  document.querySelectorAll('.kcards.drag-over').forEach(el => el.classList.remove('drag-over'));
  _dragId = null;
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function dragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
  }
}

async function dragDrop(e, status) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const id = parseInt(e.dataTransfer.getData('text/plain') || _dragId);
  if (!id) return;
  const lead = allLeads.find(l => l.id === id);
  if (!lead || lead.status === status) return;
  if (lead.status === 'fechado' && !confirm(`⚠️ Este lead já foi fechado.\nDeseja realmente mover para "${STATUS_LABEL[status].replace(/^\S+ /,'')}"?`)) return;
  await api(`/api/leads/${id}`, { method:'PATCH', body:JSON.stringify({ status }) });
  await refresh();
  toast(`Movido para ${STATUS_LABEL[status].replace(/^\S+ /,'')}`, 'success');
}

// ── Touch drag & drop ────────────────────────────────────────────────────────
let _touchId = null, _touchClone = null;

document.addEventListener('touchstart', e => {
  const card = e.target.closest('.lcard[draggable]');
  if (!card) return;
  const m = (card.getAttribute('ondragstart')||'').match(/dragStart\(event,(\d+)\)/);
  if (!m) return;
  _touchId = parseInt(m[1]);
  const r = card.getBoundingClientRect();
  _touchClone = card.cloneNode(true);
  _touchClone.style.cssText = `position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;opacity:.85;pointer-events:none;z-index:9999;transform:scale(1.04);transition:none;border-radius:12px`;
  document.body.appendChild(_touchClone);
  card.classList.add('is-dragging');
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!_touchId || !_touchClone) return;
  e.preventDefault();
  const t = e.touches[0];
  const w = parseInt(_touchClone.style.width);
  _touchClone.style.left = (t.clientX - w/2) + 'px';
  _touchClone.style.top  = (t.clientY - 40) + 'px';
  _touchClone.style.pointerEvents = 'none';
  document.querySelectorAll('.kcards').forEach(c => c.classList.remove('drag-over'));
  const el = document.elementFromPoint(t.clientX, t.clientY);
  el?.closest('.kcards')?.classList.add('drag-over');
}, { passive: false });

document.addEventListener('touchend', async e => {
  if (!_touchId) return;
  const t = e.changedTouches[0];
  if (_touchClone) { _touchClone.remove(); _touchClone = null; }
  document.querySelectorAll('.lcard.is-dragging').forEach(c => c.classList.remove('is-dragging'));
  document.querySelectorAll('.kcards.drag-over').forEach(c => c.classList.remove('drag-over'));
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const col = el?.closest('.kcards');
  if (col) {
    const status = col.id.replace('col-', '');
    const lead = allLeads.find(l => l.id === _touchId);
    if (lead && lead.status !== status) {
      if (lead.status === 'fechado' && !confirm(`⚠️ Este lead já foi fechado.\nDeseja realmente mover para "${STATUS_LABEL[status].replace(/^\S+ /,'')}"?`)) { _touchId = null; return; }
      await api(`/api/leads/${_touchId}`, { method:'PATCH', body:JSON.stringify({ status }) });
      await refresh();
      toast(`Movido para ${STATUS_LABEL[status].replace(/^\S+ /,'')}`, 'success');
    }
  }
  _touchId = null;
});
</script>
</body>
</html>
